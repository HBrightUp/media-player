services:
  postgres:
    image: postgres:16-alpine
    container_name: media-player-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_player}
      POSTGRES_USER: ${POSTGRES_USER:-media_player}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - media_player_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media_player} -d ${POSTGRES_DB:-media_player}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: media-player-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - media_player_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-production-backend:latest}
    container_name: media-player-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-media_player}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-media_player}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_KEY_PREFIX: "${REDIS_KEY_PREFIX:-media-player}"
      CORS_ORIGIN: "${MEDIA_PLAYER_PUBLIC_ORIGIN:?MEDIA_PLAYER_PUBLIC_ORIGIN is required}"
      MUSIC_DIRECTORY: "/lossless-music"
      LOSSLESS_MUSIC_DIRECTORY: "/lossless-music"
      LOSSY_MUSIC_DIRECTORY: "/lossy-music"
      SHARED_LYRICS_DIRECTORY: "/shared-lyrics"
      CLIENT_APPS_DIRECTORY: "/client-apps"
      LIBRARY_WATCH_POLL_INTERVAL: "${LIBRARY_WATCH_POLL_INTERVAL:-1m}"
      LIBRARY_WATCH_DEBOUNCE: "${LIBRARY_WATCH_DEBOUNCE:-30s}"
      LIBRARY_AUTO_SCAN_INTERVAL: "${LIBRARY_AUTO_SCAN_INTERVAL:-0}"
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ${LOSSLESS_MUSIC_DIRECTORY:-/opt/media-player/music}:/lossless-music:rw
      - ${LOSSY_MUSIC_DIRECTORY:-/opt/media-player/lossy-music}:/lossy-music:rw
      - ${SHARED_LYRICS_DIRECTORY:-/opt/media-player/shared-lyrics}:/shared-lyrics:rw
      - ${CLIENT_APPS_DIRECTORY:-/opt/media-player/apps}:/client-apps:ro

volumes:
  media_player_pgdata:
  media_player_redisdata:
